<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sơn Phượng - Báo Giá Thủy Lực</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f4f8; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,.1); }
        #loadingOverlay { display:none; position:fixed; inset:0; background:rgba(255,255,255,.92);
            z-index:999; align-items:center; justify-content:center; flex-direction:column; gap:14px; }
    </style>
</head>
<body class="p-3 md:p-5 min-h-screen">

<div id="loadingOverlay" class="flex">
    <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
    <p class="text-blue-700 font-bold">Đang tải dữ liệu...</p>
</div>

<div class="max-w-7xl mx-auto">
    <header class="text-center mb-5">
        <h1 class="text-3xl font-black text-blue-900">SƠN PHƯỢNG</h1>
        <p class="text-gray-500 text-sm">Hệ Thống Báo Giá & Thông Số Bấm Ống Thủy Lực</p>
    </header>

    <div id="errorBar" class="hidden mb-4 p-4 bg-red-50 border border-red-200 rounded-xl text-sm text-red-700 font-semibold"></div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

        <div id="inputControls" class="card p-5 border border-gray-100 hidden space-y-4">
            <h2 class="text-base font-black text-gray-800 border-b pb-2 flex items-center gap-2">
                <svg class="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/>
                </svg>
                CẤU HÌNH SẢN PHẨM
            </h2>
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">Loại Ống Thủy Lực</label>
                <select id="ongSelect"
                    class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-medium bg-gray-50 text-sm"
                    onchange="loadRenOptions()"></select>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">Chiều dài (mét)</label>
                <input type="number" id="metInput" value="1" step="0.1" min="0.1"
                    class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-medium bg-gray-50 text-sm"
                    oninput="tinhToan()">
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1">Đầu ren 1</label>
                    <select id="ren1Select"
                        class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-xs bg-gray-50"
                        onchange="tinhToan()"></select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1">Đầu ren 2</label>
                    <select id="ren2Select"
                        class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-xs bg-gray-50"
                        onchange="tinhToan()"></select>
                </div>
            </div>
        </div>

        <div id="outputControls" class="card p-5 border border-gray-100 hidden flex flex-col space-y-4">
            <div class="bg-indigo-50 border border-indigo-100 p-4 rounded-2xl">
                <h3 class="text-xs font-bold uppercase tracking-wider text-indigo-700 mb-3">⚙️ Thông Số Kỹ Thuật Bấm</h3>
                <div class="flex justify-between items-center bg-white p-3 rounded-xl mb-2 shadow-sm">
                    <span class="text-sm font-semibold text-gray-500">Khuôn bấm:</span>
                    <span id="khuonDisplay" class="font-black text-indigo-700 text-xl">--</span>
                </div>
                <div class="flex justify-between items-center bg-white p-3 rounded-xl shadow-sm">
                    <span class="text-sm font-semibold text-gray-500">Chỉnh số:</span>
                    <span id="chinhSoDisplay" class="font-black text-red-600 text-xl">--</span>
                </div>
            </div>
            <div class="flex-grow bg-gray-50 p-4 rounded-2xl border border-gray-200">
                <div class="text-xs font-bold text-gray-400 uppercase tracking-wider text-center mb-1">Tổng Tiền Thu Khách</div>
                <div id="ketQua" class="text-4xl font-black text-red-600 text-center tracking-tighter">0 đ</div>
                <div id="chiTiet" class="text-sm text-gray-600 mt-4 space-y-2"></div>
            </div>
            <button onclick="copyBaoGia()"
                class="w-full bg-[#0b3d91] text-white py-3 rounded-xl font-bold hover:bg-blue-800 transition shadow-lg active:scale-[0.98] flex justify-center items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                </svg>
                Copy Báo Giá Ngay
            </button>
        </div>
    </div>
</div>

<div id="toast"
    class="fixed bottom-5 right-5 bg-green-600 text-white px-5 py-3 rounded-xl shadow-2xl transform translate-y-20 opacity-0 transition-all duration-300 flex items-center gap-3 z-50 pointer-events-none font-medium">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
    <span id="toastMessage">Đã copy!</span>
</div>

<script>
// ═══════════════════════════════════════════
// SHEET ID – lấy từ link Google Sheets
// ═══════════════════════════════════════════
const SHEET_ID = "1Q7TcIXEAtG6MCUdfN3lzViA4xdWpwTVl";

// Tên tab trong Google Sheets (thử lần lượt)
const SHEET_NAMES = {
    ong:    ['ONG', 'ỐNG', 'Ong'],
    ren:    ['REN', 'Ren'],
    voAo:   ['VOAO', 'VO_AO', 'VoAo'],
    bam:    ['BAM', 'Bam'],
    caiDat: ['CAI_DAT', 'CAIDAT'],
};

let DATA   = { ong: [], ren: [], voAo: [], bam: [] };
let CONFIG = { HE_SO_ONG: 2, HE_SO_REN: 2, HE_SO_VOAO: 1, CONG_BAM: 60000 };

// ═══════════════════════════════════════════
// Fetch dữ liệu từ Google Sheets qua JSON API
// Dùng JSON thay CSV để tránh lỗi ký tự " trong tên ống
// ═══════════════════════════════════════════

async function fetchSheetJSON(sheetName) {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
    try {
        const res  = await fetch(url);
        const text = await res.text();
        if (!text || text.trim().startsWith('<')) return null;

        // Strip JSONP wrapper: /*O_o*/\ngoogle.visualization.Query.setResponse({...});
        const m = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)\s*;?\s*$/);
        if (!m) return null;

        const data = JSON.parse(m[1]);
        if (!data || data.status !== 'ok' || !data.table) return null;

        const cols = data.table.cols.map(c => (c.label || c.id || '').trim());
        return data.table.rows.map(row => {
            const obj = {};
            (row.c || []).forEach((cell, i) => {
                if (cols[i]) obj[cols[i]] = (cell && cell.v !== null && cell.v !== undefined) ? cell.v : '';
            });
            return obj;
        }).filter(r => Object.values(r).some(v => v !== ''));
    } catch (e) {
        console.error('fetchSheetJSON error:', sheetName, e);
        return null;
    }
}

// Kiểm tra đúng sheet hay không
const isOngSheet    = rows => rows.length > 0 && rows.some(r => /\d[\/]\d|AT|lớp|SP|SH|thủy|thắng/i.test(String(Object.values(r)[0]||'')));
const isRenSheet    = rows => rows.length > 0 && rows.some(r => /ly\b|ren|bspp|đầu/i.test(String(Object.values(r)[1]||Object.values(r)[0]||'')));
const isVoAoSheet   = rows => rows.length > 0 && Object.keys(rows[0]).some(k => /v[oỏ]|áo/i.test(k));
const isBamSheet    = rows => rows.length > 0 && Object.keys(rows[0]).some(k => /khu[oô]n|bấm|bam/i.test(k));
const isCaiDatSheet = rows => rows.length > 0 && /HE_SO|CONG/i.test(String(Object.values(rows[0])[0]||''));

async function findSheet(names, validate) {
    for (const name of names) {
        const rows = await fetchSheetJSON(name);
        if (rows && rows.length > 0 && validate(rows)) return rows;
    }
    return null;
}

// ═══════════════════════════════════════════
// Helpers
// ═══════════════════════════════════════════

function col(row, ...names) {
    for (const n of names) {
        if (row[n] !== undefined && row[n] !== '') return String(row[n]);
    }
    // Fuzzy match (NFC + lowercase)
    for (const [k, v] of Object.entries(row)) {
        const kn = k.normalize('NFC').toLowerCase();
        if (names.some(n => kn === n.normalize('NFC').toLowerCase()) && v !== '')
            return String(v);
    }
    return '';
}

function parseSize(name) {
    if (!name) return '';
    const m = String(name).match(/(1\/8|1\/4|3\/8|1\/2|5\/8|3\/4|1\s*[""]|1(?!\/))/);
    if (!m) return '';
    const s = m[0].trim().replace(/[""]/, '"');
    return (s === '1' || s === '1"') ? '1"' : s;
}

// Excel auto-converts fractions (1/2, 1/8...) thành ngày → cần giải mã lại
function excelSerialToFraction(val) {
    if (typeof val !== 'number' || val < 1000) return String(val || '');
    // Excel serial → UTC date → "M/D" fraction
    const d = new Date((Math.floor(val) - 25569) * 86400 * 1000);
    return `${d.getUTCMonth() + 1}/${d.getUTCDate()}`;
}

function normUp(s) {
    return String(s).trim().toUpperCase().normalize('NFC');
}

// ═══════════════════════════════════════════
// Boot: tải dữ liệu khi mở trang
// ═══════════════════════════════════════════

window.addEventListener('DOMContentLoaded', async () => {
    document.getElementById('loadingOverlay').style.display = 'flex';
    try {
        const [ong, ren, voAo, bam, caiDat] = await Promise.all([
            findSheet(SHEET_NAMES.ong,    isOngSheet),
            findSheet(SHEET_NAMES.ren,    isRenSheet),
            findSheet(SHEET_NAMES.voAo,   isVoAoSheet),
            findSheet(SHEET_NAMES.bam,    isBamSheet),
            findSheet(SHEET_NAMES.caiDat, isCaiDatSheet),
        ]);

        if (!ong) throw new Error('Không đọc được sheet ONG. Tab Google Sheets phải đặt tên "ONG".');
        if (!ren) throw new Error('Không đọc được sheet REN.');

        DATA.ong  = ong;
        DATA.ren  = ren;
        DATA.voAo = voAo || [];
        DATA.bam  = bam  || [];

        (caiDat || []).forEach(r => {
            const k = String(Object.values(r)[0] || '').trim();
            const v = parseFloat(String(Object.values(r)[1] || ''));
            if (k && !isNaN(v)) CONFIG[k] = v;
        });

        console.log('✅ Loaded ONG:', DATA.ong.length, 'REN:', DATA.ren.length, 'BAM:', DATA.bam.length);
        console.log('BAM data:', DATA.bam.map(b => Object.values(b).slice(0,3)));
        initUI();
    } catch (err) {
        document.getElementById('errorBar').innerHTML = '❌ ' + err.message;
        document.getElementById('errorBar').classList.remove('hidden');
        console.error(err);
    }
    document.getElementById('loadingOverlay').style.display = 'none';
});

// ═══════════════════════════════════════════
// UI
// ═══════════════════════════════════════════

function initUI() {
    const sel = document.getElementById('ongSelect');
    sel.innerHTML = '';
    DATA.ong.forEach(o => {
        const ten = col(o, 'Loại ống', 'Loai ong', 'ten') || String(Object.values(o)[0] || '');
        if (ten) sel.add(new Option(ten, ten));
    });
    document.getElementById('inputControls').classList.remove('hidden');
    document.getElementById('outputControls').classList.remove('hidden');
    loadRenOptions();
}

function loadRenOptions() {
    const ongName = document.getElementById('ongSelect').value;
    const sz = parseSize(ongName).replace(/[""]/, '').replace('"', '').trim();

    const r1 = document.getElementById('ren1Select');
    const r2 = document.getElementById('ren2Select');
    const p1 = r1.value, p2 = r2.value;
    r1.innerHTML = ''; r2.innerHTML = '';

    let list = DATA.ren.filter(r => {
        const raw = col(r, 'Cỡ ống', 'Co ong', 'Size') || Object.values(r)[0] || '';
        const co  = excelSerialToFraction(raw);  // giải mã serial ngày → phân số
        const rsz = parseSize(co).replace(/[""]/, '').replace('"', '').trim();
        return sz && rsz && rsz === sz;
    });
    if (!list.length) list = DATA.ren;

    list.forEach(r => {
        const name = col(r, 'Đầu ren', 'Dau ren', 'ten') || String(Object.values(r)[1] || '');
        if (name) { r1.add(new Option(name, name)); r2.add(new Option(name, name)); }
    });

    if ([...r1.options].some(o => o.value === p1)) r1.value = p1;
    if ([...r2.options].some(o => o.value === p2)) r2.value = p2;
    tinhToan();
}

// ═══════════════════════════════════════════
// Tính toán giá + thông số bấm
// ═══════════════════════════════════════════

function tinhToan() {
    if (!DATA.ong.length) return;

    const ongName  = document.getElementById('ongSelect').value;
    const ren1Name = document.getElementById('ren1Select').value;
    const ren2Name = document.getElementById('ren2Select').value;
    const met      = parseFloat(document.getElementById('metInput').value) || 0;
    if (!ongName || !ren1Name || !ren2Name) return;

    // Lấy giá ống
    const ongRow = DATA.ong.find(o => (col(o,'Loại ống','Loai ong','ten') || String(Object.values(o)[0]||'')) === ongName) || {};
    const gVonOng  = parseFloat(col(ongRow,'Giá vốn/m','Gia von/m') || String(Object.values(ongRow)[1]||0)) || 0;
    const tenVoAo  = col(ongRow,'Vỏ áo','Vo ao') || String(Object.values(ongRow)[2]||'');

    // Vỏ áo
    let gVonVoAo = 0;
    if (tenVoAo && DATA.voAo.length) {
        const va = DATA.voAo.find(v => (col(v,'Vỏ áo','Vo ao')||String(Object.values(v)[0]||'')) === tenVoAo);
        if (va) gVonVoAo = parseFloat(col(va,'Giá vốn','Gia von')||String(Object.values(va)[1]||0)) || 0;
    }

    // Ren
    const findRen = n => DATA.ren.find(r => (col(r,'Đầu ren','Dau ren','ten')||String(Object.values(r)[1]||'')) === n) || {};
    const gVonR1 = parseFloat(col(findRen(ren1Name),'Giá vốn','Gia von')||String(Object.values(findRen(ren1Name))[2]||0)) || 0;
    const gVonR2 = parseFloat(col(findRen(ren2Name),'Giá vốn','Gia von')||String(Object.values(findRen(ren2Name))[2]||0)) || 0;

    // ════ Thông số bấm ════
    let tsKhuon = '--', tsChinhSo = '--';

    if (DATA.bam.length) {
        // Lấy tên ống trong BAM (cột đầu tiên hoặc cột 'Loại ống')
        const bamName = b => normUp(col(b,'Loại ống','Loai ong','Tên ống','Ten ong') || String(Object.values(b)[0]||''));

        // Bước 1: So khớp chính xác (case-insensitive, NFC)
        let hit = DATA.bam.find(b => bamName(b) === normUp(ongName));

        // Bước 2: So khớp size + loại (AT/SP/SH)
        if (!hit) {
            const sk = parseSize(ongName).replace(/[""\s]/g,'');  // "1/2" → "1/2"
            const tm = ongName.match(/(4SP|4SH|4AT|2AT|1AT)/i);
            const tk = tm ? tm[0].toUpperCase() : '';
            console.log('BAM step2: size=', sk, 'type=', tk);
            if (sk) {
                hit = DATA.bam.find(b => {
                    const bn = bamName(b).replace(/[""\s]/g,'');
                    return bn.includes(sk) && (!tk || bn.includes(tk));
                });
            }
            // Bước 3: Chỉ theo size
            if (!hit && sk) {
                hit = DATA.bam.find(b => bamName(b).replace(/[""\s]/g,'').includes(sk));
            }
        }

        console.log('BAM hit for', ongName, '→', hit ? Object.values(hit).slice(0,3) : 'NOT FOUND');

        if (hit) {
            // Đọc khuôn và chỉnh số theo tên cột hoặc vị trí
            const vals = Object.values(hit);
            const keys = Object.keys(hit);
            const findCol = (...pats) => {
                for (const [k, v] of Object.entries(hit)) {
                    const kn = k.normalize('NFC').toLowerCase();
                    if (pats.some(p => kn.includes(p)) && v !== '') return String(v);
                }
                return '';
            };
            tsKhuon   = findCol('khu') || String(vals[1] ?? '--');
            tsChinhSo = findCol('chỉnh','chinh','số','so') || String(vals[2] ?? '--');
        }
    }

    document.getElementById('khuonDisplay').innerText   = tsKhuon;
    document.getElementById('chinhSoDisplay').innerText = tsChinhSo;

    // Tính giá
    const gOng  = gVonOng * met * CONFIG.HE_SO_ONG;
    const gRen  = (gVonR1 + gVonR2) * CONFIG.HE_SO_REN;
    const gVo   = gVonVoAo * 2 * CONFIG.HE_SO_VOAO;
    const raw   = gOng + gRen + gVo + CONFIG.CONG_BAM;
    const total = Math.ceil(raw / 5000) * 5000;

    document.getElementById('ketQua').innerText = `${total.toLocaleString('vi-VN')} đ`;
    document.getElementById('chiTiet').innerHTML = `
        <div class="flex justify-between border-b pb-1.5"><span>1. Tiền Ống:</span><b>${gOng.toLocaleString('vi-VN')} đ</b></div>
        <div class="flex justify-between border-b pb-1.5"><span>2. Đầu ren (2 cái):</span><b>${gRen.toLocaleString('vi-VN')} đ</b></div>
        <div class="flex justify-between border-b pb-1.5"><span>3. Vỏ áo (2 cái):</span><b>${gVo.toLocaleString('vi-VN')} đ</b></div>
        <div class="flex justify-between pt-1"><span>4. Công bấm:</span><b>${CONFIG.CONG_BAM.toLocaleString('vi-VN')} đ</b></div>`;

    window.baoGiaText =
        `KIM KHÍ ĐIỆN MÁY SƠN PHƯỢNG\n--- BÁO GIÁ THỦY LỰC ---\n\n` +
        `ỐNG: ${ongName}\nCHIỀU DÀI: ${met} mét\nREN 1: ${ren1Name}\nREN 2: ${ren2Name}\n\n` +
        `=> TỔNG THÀNH TIỀN: ${total.toLocaleString('vi-VN')} đ\n(Đã bao gồm công bấm và vỏ áo)\nCảm ơn quý khách!`;
}

function copyBaoGia() {
    if (!window.baoGiaText) return;
    navigator.clipboard.writeText(window.baoGiaText).then(() => {
        const t = document.getElementById('toast');
        t.classList.remove('translate-y-20', 'opacity-0');
        setTimeout(() => t.classList.add('translate-y-20', 'opacity-0'), 2500);
    }).catch(() => alert('Không thể copy!'));
}
</script>
</body>
</html>
